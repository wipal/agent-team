<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Team Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/ui/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Project Selector -->
        <header class="header">
            <div class="header-row">
                <div>
                    <h1>🤖 Agent Team Dashboard</h1>
                    <p class="subtitle">Manage AI agents for your project</p>
                </div>
                <!-- Project Selector -->
                <div class="project-selector" x-data="projectSelector()">
                    <label>Project:</label>
                    <select @change="switchProject($event)" x-model="currentProject" :disabled="loading">
                        <template x-for="project in projects" :key="project.path">
                            <option :value="project.path" :selected="project.path === currentProject">
                                <span x-text="project.name"></span>
                            </option>
                        </template>
                    </select>
                    <span x-show="loading" class="loading-indicator">Switching...</span>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav">
            <a href="/ui/" class="nav-link active">Dashboard</a>
            <a href="/ui/agents.html" class="nav-link">Agents</a>
            <a href="/ui/skills.html" class="nav-link">Skills</a>
            <a href="/ui/roles.html" class="nav-link">Roles</a>
        </nav>

        <!-- Stats Cards -->
        <div class="stats-grid" x-data="statsCards()">
            <template x-if="loading">
                <div class="stat-card"><div class="loading">Loading...</div></div>
            </template>
            <template x-if="!loading">
                <template x-for="stat in stats" :key="stat.label">
                    <div class="stat-card">
                        <div class="stat-value" x-text="stat.value"></div>
                        <div class="stat-label" x-text="stat.label"></div>
                    </div>
                </template>
            </template>
        </div>

        <!-- Quick Actions -->
        <section class="section">
            <h2>Quick Actions</h2>
            <div class="actions-grid">
                <button class="btn btn-primary" onclick="location.href='/ui/agents.html?action=add'">
                    ➕ Add Agent
                </button>
                <button class="btn btn-secondary" onclick="location.href='/ui/skills.html'">
                    📚 Browse Skills
                </button>
                <button class="btn btn-secondary" onclick="location.href='/ui/roles.html'">
                    ⚙️ Configure Roles
                </button>
            </div>
        </section>

        <!-- Recent Agents -->
        <section class="section">
            <h2>Your Agents</h2>
            <div id="agents-list" x-data="dashboardAgents()">
                <div x-show="loading" class="loading">Loading agents...</div>
                <div x-show="!loading && agents.length === 0" class="empty-state">
                    <p>No agents configured yet. <a href="/ui/agents.html?action=add">Add your first agent</a></p>
                </div>
                <template x-for="agent in agents" :key="agent.name">
                    <div class="agent-card-compact">
                        <span class="agent-name" x-text="agent.name"></span>
                        <span class="agent-role" x-text="agent.variants?.base_role || 'unknown'"></span>
                    </div>
                </template>
                <div x-show="!loading && agents.length > 0" style="margin-top: 1rem;">
                    <a href="/ui/agents.html" class="btn btn-secondary">Manage Agents</a>
                </div>
            </div>
        </section>

        <!-- Available Roles -->
        <section class="section">
            <h2>Available Roles</h2>
            <div id="roles-list" x-data="rolesPreview()">
                <div x-show="loading" class="loading">Loading roles...</div>
                <div class="roles-grid-preview">
                    <template x-for="role in roles" :key="role.name">
                        <div class="role-chip">
                            <strong x-text="role.name"></strong>
                            <span x-text="role.description"></span>
                        </div>
                    </template>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Project Selector Alpine Component
        function projectSelector() {
            return {
                projects: [],
                currentProject: '',
                loading: false,

                async init() {
                    await this.loadProjects();
                    await this.loadCurrentProject();
                },

                async loadProjects() {
                    try {
                        const response = await fetch('/api/projects');
                        const data = await response.json();
                        this.projects = data.projects.filter(p => p.valid);
                    } catch (error) {
                        console.error('Failed to load projects:', error);
                    }
                },

                async loadCurrentProject() {
                    try {
                        const response = await fetch('/api/projects/current');
                        const project = await response.json();
                        this.currentProject = project.path;
                    } catch (error) {
                        console.error('Failed to load current project:', error);
                    }
                },

                async switchProject(event) {
                    const newPath = event.target.value;
                    if (newPath === this.currentProject) return;

                    this.loading = true;
                    try {
                        const response = await fetch('/api/projects/switch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ path: newPath })
                        });

                        if (response.ok) {
                            this.currentProject = newPath;
                            // Trigger HTMX refresh
                            document.body.dispatchEvent(new CustomEvent('projectChanged'));
                        } else {
                            const error = await response.json();
                            alert('Failed to switch project: ' + error.error);
                        }
                    } catch (error) {
                        alert('Failed to switch project: ' + error.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }

        // Dashboard Agents Alpine Component
        function dashboardAgents() {
            return {
                agents: [],
                loading: true,

                async init() {
                    await this.loadAgents();
                    // Listen for project changes
                    document.body.addEventListener('projectChanged', () => this.loadAgents());
                },

                async loadAgents() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/agents');
                        const data = await response.json();
                        this.agents = data.agents || [];
                    } catch (error) {
                        console.error('Failed to load agents:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }

        // Roles Preview Alpine Component
        function rolesPreview() {
            return {
                roles: [],
                loading: true,

                async init() {
                    try {
                        const response = await fetch('/api/agents/meta/roles');
                        this.roles = await response.json();
                    } catch (error) {
                        console.error('Failed to load roles:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }

        // Stats Cards Alpine Component
        function statsCards() {
            return {
                stats: [],
                loading: true,

                async init() {
                    await this.loadStats();
                    // Listen for project changes
                    document.body.addEventListener('projectChanged', () => this.loadStats());
                },

                async loadStats() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/agents');
                        const data = await response.json();
                        const agents = data.agents || [];
                        const roles = [...new Set(agents.map(a => a.variants?.base_role).filter(Boolean))];

                        this.stats = [
                            { value: agents.length, label: 'Total Agents' },
                            { value: roles.length, label: 'Roles Used' },
                            { value: 50, label: 'Skills Available' },
                            { value: 9, label: 'Roles Available' }
                        ];
                    } catch (error) {
                        console.error('Failed to load stats:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
